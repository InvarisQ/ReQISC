name: Feature request
description: Suggest a scoped feature for the workbench.
title: "feature: "
labels: [enhancement]
body:
  - type: dropdown
    id: layer
    attributes:
      label: Affected layer
      options:
        - Mathematical primitive
        - Compiler pass scaffold
        - Hardware profile
        - Calibration model
        - Benchmark scaffold
        - Documentation
        - Governance or infrastructure
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What gap does this feature address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed feature
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: References or evidence
      description: Include prior art, docs, or reproducibility notes if relevant.
  - type: checkboxes
    id: boundaries
    attributes:
      label: Boundaries
      options:
        - label: This does not introduce unsupported benchmark claims.
        - label: This does not imply third-party sponsorship or affiliation.
        - label: This can be tested or documented in a bounded way.
