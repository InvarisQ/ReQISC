name: Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check documentation files exist
        run: |
          test -f docs/index.md
          test -f docs/architecture.md
          test -f docs/netlify-open-source-details.md
          test -f website/public/index.html
      - name: Check README links to core docs
        run: |
          grep -q "CONTRIBUTING.md" README.md
          grep -q "ROADMAP.md" README.md
          grep -q "GOVERNANCE.md" README.md
