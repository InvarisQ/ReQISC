name: Release dry-run

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  build-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tool
        run: python -m pip install build
      - name: Build package without publishing
        run: python -m build
